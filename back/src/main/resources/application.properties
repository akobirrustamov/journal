spring.datasource.url=jdbc:postgresql://localhost:5433/journal
spring.datasource.username=postgres
spring.datasource.password=akow8434
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB
server.port=8080

# ── Application ────────────────────────────────────────────────────────
app.name=Scientific Journal Platform
app.base-url=http://localhost:8080

# ── Email (SMTP) ───────────────────────────────────────────────────────
# Un-comment and configure for production email delivery
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
# Dev stub (JavaMailSender required bean — enable one of the above OR use a MailConfig stub)
spring.mail.host=localhost
spring.mail.port=1025

# ── MinIO Object Storage ───────────────────────────────────────────────
minio.enabled=false
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.articles=articles
minio.bucket.journals=journals
minio.bucket.reviews=reviews

# ── DOI / CrossRef ─────────────────────────────────────────────────────
doi.prefix=10.12345
doi.crossref.enabled=false
#doi.crossref.username=your-crossref-username
#doi.crossref.password=your-crossref-password

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── Cache ──────────────────────────────────────────────────────────────
spring.cache.type=simple

# ── Async (email notifications) ────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=500

# ── Logging ────────────────────────────────────────────────────────────
logging.level.com.example.backend=INFO
logging.level.org.springframework.security=WARN
